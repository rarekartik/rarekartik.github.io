<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Calculator</title>
    
    <!-- External Graphic and Icon Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-calc: #111112;
            --btn-gray: #3a3a3c;
            --btn-orange: #ff9f0a;
            --btn-light-gray: #a5a5a5;
            
            --bg-app: #050505;
            --bg-surface: rgba(18, 18, 18, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent: #3b82f6;
            --font-sans: 'Satoshi', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); }
        body, html { width: 100%; height: 100%; height: 100dvh; overflow: hidden; background: #000; }

        /* --- DECOY CALCULATOR SHELL --- */
        #decoy-shell {
            width: 100%;
            height: 100%;
            height: 100dvh;
            background-color: var(--bg-calc);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            position: absolute;
            top: 0; left: 0; z-index: 10;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .calc-screen {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 20px;
            color: #fff;
            font-size: 4.5rem;
            font-weight: 300;
            overflow: hidden;
            word-break: break-all;
            text-align: right;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .calc-btn {
            border: none;
            outline: none;
            border-radius: 50%;
            aspect-ratio: 1;
            font-size: 1.8rem;
            font-weight: 500;
            color: #fff;
            background-color: var(--btn-gray);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calc-btn:active { filter: brightness(1.25); }
        .calc-btn.orange { background-color: var(--btn-orange); }
        .calc-btn.light { background-color: var(--btn-light-gray); color: #000; }
        .calc-btn.zero { grid-column: span 2; aspect-ratio: auto; border-radius: 40px; padding-left: 25px; justify-content: flex-start; }

        /* --- SECRET CHAT VAULT WORKSPACE --- */
        #vault-shell {
            width: 100%;
            height: 100%;
            height: 100dvh;
            position: absolute;
            top: 0; left: 0; z-index: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-app);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .chat-viewport { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: rgba(5, 5, 5, 0.2); 
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            overflow: hidden;
        }
        
        .chat-header { 
            height: 75px; 
            padding: 0 20px; 
            padding-top: max(0px, env(safe-area-inset-top));
            background: var(--bg-surface); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        .identity-cluster { display: flex; align-items: center; gap: 12px; }
        .avatar-frame { width: 42px; height: 42px; border-radius: 50%; background: #27272a; display: flex; align-items: center; justify-content: center; font-weight: 700; overflow: hidden; border: 1px solid var(--border); color: #fff; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .messages-area { 
            flex: 1; 
            overflow-y: scroll; 
            -webkit-overflow-scrolling: touch;
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        .msg-bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.45; color: #fff; word-break: break-word; }
        .msg-bubble.sent { background-color: #1e40af; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-bubble.received { background-color: #27272a; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-meta { display: block; font-size: 0.7rem; color: rgba(255, 255, 255, 0.35); margin-top: 4px; text-align: right; }

        .input-bar { 
            padding: 12px 16px; 
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: var(--bg-surface); 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 8px; 
            align-items: center;
            flex-shrink: 0;
        }
        
        .message-form { flex: 1; display: flex; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 24px; padding: 4px 6px 4px 14px; align-items: center; }
        .message-form input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 0.95rem; height: 36px; }
        .icon-btn { width: 38px; height: 38px; border-radius: 50%; border: none; background: transparent; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .icon-btn.send-btn { background: var(--accent); color: #fff; }

        /* --- SYSTEM TOAST BANNER --- */
        #inapp-toast {
            position: fixed; top: max(20px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%) translateY(-150%);
            width: 90%; max-width: 380px; background: #1c1c1e; border: 1px solid var(--border); border-radius: 12px;
            padding: 14px; z-index: 1000; display: flex; gap: 12px; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #inapp-toast.active { transform: translateX(-50%) translateY(0); }

        #profile-setup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
            transform: translateY(100%); transition: transform 0.4s ease;
        }
        .setup-box { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .setup-box input { width: 100%; padding: 12px; background: #1c1c1e; border: 1px solid var(--border); border-radius: 8px; color: #fff; outline: none; }
        .setup-box button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. DECOY EXTERNAL SHELL -->
    <div id="decoy-shell">
        <div class="calc-screen" id="calcDisplay">0</div>
        <div class="calc-grid">
            <button class="calc-btn light" onclick="clearCalc()">AC</button>
            <button class="calc-btn light" onclick="pressKey('/')">÷</button>
            <button class="calc-btn light" onclick="pressKey('*')">×</button>
            <button class="calc-btn orange" onclick="pressKey('-')">−</button>
            
            <button class="calc-btn" onclick="pressKey('7')">7</button>
            <button class="calc-btn" onclick="pressKey('8')">8</button>
            <button class="calc-btn" onclick="pressKey('9')">9</button>
            <button class="calc-btn orange" onclick="pressKey('+')">+</button>
            
            <button class="calc-btn" onclick="pressKey('4')">4</button>
            <button class="calc-btn" onclick="pressKey('5')">5</button>
            <button class="calc-btn" onclick="pressKey('6')">6</button>
            <button class="calc-btn orange" onclick="evalCalc('=')">=</button>
            
            <button class="calc-btn" onclick="pressKey('1')">1</button>
            <button class="calc-btn" onclick="pressKey('2')">2</button>
            <button class="calc-btn" onclick="pressKey('3')">3</button>
            <button class="calc-btn zero" onclick="pressKey('0')">0</button>
        </div>
    </div>

    <!-- 2. PRIVATE VAULT SYSTEM -->
    <div id="vault-shell">
        <canvas id="bg-canvas"></canvas>
        <div class="chat-viewport">
            <header class="chat-header">
                <div class="identity-cluster">
                    <div class="avatar-frame" id="chatAvatar">?</div>
                    <div>
                        <h3 id="chatPartnerName" style="color: #fff; font-size: 1.05rem;">Syncing Room...</h3>
                        <span id="chatPartnerStatus" style="font-size:0.75rem; color:var(--text-secondary);">Room Connected</span>
                    </div>
                </div>
                <div style="display: flex; gap: 6px;">
                    <button class="icon-btn" onclick="resetIdentityProfile()"><i class="fas fa-user-edit"></i></button>
                    <button class="icon-btn" onclick="lockVault()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="messages-area" id="msgViewport"></div>

            <footer class="input-bar">
                <input type="file" id="imageInput" style="display:none;" accept="image/*" onchange="handleImageInjection(event)">
                <input type="file" id="whatsappInput" style="display:none;" accept=".txt" onchange="handleWhatsAppImport(event)">
                
                <button class="icon-btn" onclick="document.getElementById('imageInput').click()"><i class="fas fa-camera"></i></button>
                <button class="icon-btn" onclick="document.getElementById('whatsappInput').click()"><i class="fas fa-file-import"></i></button>
                
                <form class="message-form" id="chatForm">
                    <input type="text" id="msgField" placeholder="Send secure statement..." autocomplete="off">
                    <button type="submit" class="icon-btn send-btn"><i class="fas fa-arrow-up"></i></button>
                </form>
            </footer>
        </div>
    </div>

    <!-- IN-APP DECOY NOTIFICATION TOAST -->
    <div id="inapp-toast">
        <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png" style="width:36px; height:36px;" alt="Weather icon">
        <div style="flex:1;">
            <h4 style="color:#fff; font-size:0.85rem; font-weight:700;">Weather Alert System</h4>
            <p style="color:var(--text-secondary); font-size:0.8rem; margin-top:2px;">Weather is so good, let's go for a ride</p>
        </div>
    </div>

    <!-- 3. PROFILE INITIALIZER ONBOARDING -->
    <div id="profile-setup">
        <div class="setup-box">
            <h2 style="color:#fff; text-align:center; margin-bottom:10px;">Workspace Profiles</h2>
            <input type="text" id="usernameInput" placeholder="Enter display username">
            <input type="text" id="profilePicInput" placeholder="Paste Profile Image URL (or leave blank)">
            <button onclick="saveWorkspaceProfile()">Initialize Profile Identity</button>
        </div>
    </div>

    <!-- Firebase Connection Engine Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeFirestore, doc, setDoc, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAFwnFKnoV7mYi0hm5fikzzjX_WfINss-k",
          authDomain: "roll-no-48.firebaseapp.com",
          projectId: "roll-no-48",
          storageBucket: "roll-no-48.firebasestorage.app",
          messagingSenderId: "734946482686",
          appId: "1:734946482686:web:2521a0ab55194a8dac88af"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, {});

        let currentUser = localStorage.getItem('workspace_user') || '';
        const SECRET_PASSCODE = "0848";
        let vaultOpen = false;

        /* --- HIGH-PERFORMANCE ALERT ENGINE --- */
        let workerRegistration = null;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => { workerRegistration = reg; })
                .catch(err => console.log("Service Worker dropped:", err));
        }

        function triggerInAppToast() {
            // 1. Show the inside layout banner visually if app interface is visible
            const toast = document.getElementById('inapp-toast');
            toast.classList.add('active');
            setTimeout(() => {
                toast.classList.remove('active');
            }, 4500);

            // 2. Wake up background Service Worker task to ping native device context
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'TRIGGER_DECOY'
                });
            }
        }

        /* --- CALCULATOR ENGINE --- */
        let displayStr = "";
        window.pressKey = function(key) {
            displayStr += key;
            document.getElementById('calcDisplay').innerText = displayStr;
        };
        window.clearCalc = function() {
            displayStr = "";
            document.getElementById('calcDisplay').innerText = "0";
        };
        window.evalCalc = function() {
            if (displayStr === SECRET_PASSCODE) {
                clearCalc();
                unlockVault();
                return;
            }
            try {
                let res = eval(displayStr);
                document.getElementById('calcDisplay').innerText = res;
                displayStr = res.toString();
            } catch {
                document.getElementById('calcDisplay').innerText = "Error";
                displayStr = "";
            }
        };

        /* --- VAULT ENGINE --- */
        function unlockVault() {
            vaultOpen = true;
            document.getElementById('decoy-shell').style.transform = "translateY(-100%)";
            document.getElementById('vault-shell').style.opacity = "1";
            document.getElementById('vault-shell').style.pointerEvents = "all";
            
            if (!currentUser) {
                document.getElementById('profile-setup').style.transform = "translateY(0)";
            } else {
                bootSecureChatStream();
            }
        }

        window.lockVault = function() {
            vaultOpen = false;
            document.getElementById('decoy-shell').style.transform = "translateY(0)";
            document.getElementById('vault-shell').style.opacity = "0";
            document.getElementById('vault-shell').style.pointerEvents = "none";
        };

        window.resetIdentityProfile = function() {
            localStorage.removeItem('workspace_user');
            currentUser = '';
            document.getElementById('profile-setup').style.transform = "translateY(0)";
        };

        window.saveWorkspaceProfile = async function() {
            const name = document.getElementById('usernameInput').value.trim();
            const pic = document.getElementById('profilePicInput').value.trim() || `https://api.dicebear.com/7.x/bottts/svg?seed=${name}`;
            if (!name) return alert("Please specify profile tag");
            
            currentUser = name;
            localStorage.setItem('workspace_user', name);
            
            await setDoc(doc(db, "users", name), { username: name, avatar: pic, timestamp: Date.now() });
            document.getElementById('profile-setup').style.transform = "translateY(100%)";
            bootSecureChatStream();
        };

        /* --- REAL-TIME DATA PROCESSING --- */
        let activeListener = false;

        function syncHeaderIdentity() {
            const usersRef = collection(db, "users");
            onSnapshot(usersRef, (snapshot) => {
                let foundPartner = false;
                snapshot.forEach((docSnap) => {
                    const userData = docSnap.data();
                    if (userData.username !== currentUser) {
                        foundPartner = true;
                        document.getElementById('chatPartnerName').innerText = userData.username;
                        document.getElementById('chatPartnerStatus').innerText = "Sync Room Active";
                        const avatarFrame = document.getElementById('chatAvatar');
                        if (userData.avatar.startsWith('http')) {
                            avatarFrame.innerHTML = `<img src="${userData.avatar}" />`;
                        } else {
                            avatarFrame.innerText = userData.username.charAt(0).toUpperCase();
                        }
                    }
                });
                if (!foundPartner) {
                    document.getElementById('chatPartnerName').innerText = "Waiting for partner...";
                }
            });
        }

        function bootSecureChatStream() {
            if (activeListener) return;
            activeListener = true;
            
            syncHeaderIdentity();
            const viewport = document.getElementById('msgViewport');
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            
            onSnapshot(q, (snapshot) => {
                let changes = snapshot.docChanges();
                
                changes.forEach((change) => {
                    if (change.type === "added") {
                        if (document.getElementById(change.doc.id)) return;
                        
                        const data = change.doc.data();
                        const bubble = document.createElement('div');
                        bubble.id = change.doc.id;
                        bubble.className = `msg-bubble ${data.sender === currentUser ? 'sent' : 'received'}`;
                        
                        if (data.type === "image") {
                            bubble.innerHTML = `<img src="${data.body}" style="width:100%; border-radius:12px; margin-bottom:4px;"><span class="msg-meta">${data.sender}</span>`;
                        } else {
                            bubble.innerHTML = `${data.body}<span class="msg-meta">${data.sender}</span>`;
                        }
                        
                        viewport.appendChild(bubble);
                        
                        if (data.sender !== currentUser) {
                            triggerInAppToast();
                        }
                    }
                });
                
                setTimeout(() => {
                    viewport.scrollTop = viewport.scrollHeight;
                }, 50);
            });
        }

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('msgField');
            const val = input.value.trim();
            if (!val) return;
            input.value = "";

            await addDoc(collection(db, "messages"), {
                sender: currentUser,
                body: val,
                type: "text",
                timestamp: Date.now()
            });
        });

        window.handleWhatsAppImport = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const lines = e.target.result.split('\n');
                const messageRegex = /^\[?(\d{1,2}\/\d{1,2}\/\d{2,4}),?\s(\d{1,2}:\d{2}(?::\d{2})?\s?[APMapm]?)\]?\s-\s([^:]+):\s(.*)$/;
                let count = 0;

                for (let line of lines) {
                    const match = line.match(messageRegex);
                    if (match) {
                        const [,, senderName, messageBody] = match;
                        if (messageBody.includes("<Media omitted>") || messageBody.includes("encrypted")) continue;

                        await addDoc(collection(db, "messages"), {
                            sender: senderName.trim(),
                            body: messageBody.trim(),
                            type: "text",
                            timestamp: Date.now() + count
                        });
                        count++;
                    }
                }
                alert(`Imported ${count} messages successfully.`);
            };
            reader.readAsText(file);
        };

        window.handleImageInjection = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                await addDoc(collection(db, "messages"), {
                    sender: currentUser,
                    body: e.target.result,
                    type: "image",
                    timestamp: Date.now()
                });
            };
            reader.readAsDataURL(file);
        };

        /* --- BACKGROUND RENDERING LAYER --- */
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 30;

        const geom = new THREE.BufferGeometry();
        const posArray = new Float32Array(120 * 3);
        for(let i=0; i<360; i++) posArray[i] = (Math.random()-0.5)*90;
        geom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const mesh = new THREE.Points(geom, new THREE.PointsMaterial({ size: 0.06, color: 0x3b82f6, transparent: true, opacity: 0.25 }));
        scene.add(mesh);

        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += 0.0002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
